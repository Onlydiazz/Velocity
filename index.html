<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity - 3D Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }

        #renderCanvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
            z-index: 10;
        }

        #score {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #00ff88;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #00ff88;
            z-index: 10;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #00ff88;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border: 2px solid #00ff88;
            border-radius: 8px;
            z-index: 10;
        }

        .control-item {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <canvas id="renderCanvas"></canvas>
    
    <div id="ui">
        <div>🎮 VELOCITY</div>
    </div>

    <div id="score">
        <div>Equipe A: <span id="team-a">0</span></div>
        <div>Equipe B: <span id="team-b">0</span></div>
    </div>

    <div id="controls">
        <div class="control-item">⬆️ W - Frente</div>
        <div class="control-item">⬇️ S - Trás</div>
        <div class="control-item">⬅️ A - Esquerda</div>
        <div class="control-item">➡️ D - Direita</div>
        <div class="control-item">🔼 SPACE - Pulo/Boost</div>
    </div>

    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script src="https://cdn.babylonjs.com/cannon.js"></script>
    <script type="module" src="/src/main.js"></script>
</body>
</html>
